<!DOCTYPE html>
<!--
  Solana Auditor — self-contained HTML audit report
  Single file, no external dependencies, no CDN, no network.
  Populate the INLINE `findings.json` below (the const DATA) from
  audit-workspace/reports/findings.json, then open in any browser.

  Usage (from /audit-report):
    1. cp skill/report-template.html audit-workspace/reports/audit-report.html
    2. Replace the `const DATA = {...}` block with the contents of findings.json
    3. Open audit-workspace/reports/audit-report.html
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Security Audit Report</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e;
    --critical:#f85149; --high:#ff7b72; --medium:#d29922; --low:#3fb950; --info:#58a6ff;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#ffffff; --panel:#f6f8fa; --border:#d0d7de; --text:#1f2328; --muted:#656d76; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    line-height:1.55;padding:0 0 80px}
  header{padding:32px 24px;border-bottom:1px solid var(--border);background:var(--panel)}
  .wrap{max-width:980px;margin:0 auto;padding:0 24px}
  h1{margin:0 0 4px;font-size:24px}
  .meta{color:var(--muted);font-size:14px}
  .meta code{font-family:var(--mono)}
  .cards{display:flex;gap:12px;flex-wrap:wrap;margin:24px 0}
  .card{flex:1;min-width:120px;border:1px solid var(--border);border-radius:8px;
    padding:14px 16px;background:var(--panel);cursor:pointer;user-select:none}
  .card .n{font-size:28px;font-weight:700}
  .card .l{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .card.active{outline:2px solid var(--info)}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .s-critical{color:var(--critical)} .bg-critical{background:var(--critical)}
  .s-high{color:var(--high)} .bg-high{background:var(--high)}
  .s-medium{color:var(--medium)} .bg-medium{background:var(--medium)}
  .s-low{color:var(--low)} .bg-low{background:var(--low)}
  .s-informational{color:var(--info)} .bg-informational{background:var(--info)}
  .controls{display:flex;gap:8px;align-items:center;margin:16px 0;flex-wrap:wrap}
  input[type=search]{flex:1;min-width:200px;padding:8px 12px;border-radius:6px;
    border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px}
  .finding{border:1px solid var(--border);border-radius:8px;margin:12px 0;background:var(--panel);overflow:hidden}
  .finding summary{padding:14px 16px;cursor:pointer;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .finding summary::-webkit-details-marker{display:none}
  .badge{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    padding:3px 8px;border-radius:999px;border:1px solid currentColor}
  .fid{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .ftitle{font-weight:600}
  .floc{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .body{padding:0 16px 16px;border-top:1px solid var(--border)}
  .body h4{margin:16px 0 4px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;
    overflow:auto;font-family:var(--mono);font-size:13px}
  .kv{font-size:13px;color:var(--muted)}
  .kv code{font-family:var(--mono);color:var(--text)}
  footer{color:var(--muted);font-size:12px;text-align:center;margin-top:40px}
  .empty{color:var(--muted);text-align:center;padding:40px}
</style>
</head>
<body>
<header><div class="wrap">
  <h1 id="title">Security Audit Report</h1>
  <div class="meta" id="meta"></div>
</div></header>

<div class="wrap">
  <div class="cards" id="cards"></div>
  <div class="controls">
    <input type="search" id="q" placeholder="Filter findings by title, category, file…">
    <span class="kv" id="count"></span>
  </div>
  <div id="list"></div>
  <footer>Generated by <strong>solana-auditor</strong> · Superteam Brasil · self-contained, offline.</footer>
</div>

<script>
// ─── PASTE findings.json HERE (replace the whole DATA object) ────────────────
const DATA = {
  "audit": { "protocol": "Example Protocol", "commit": "abc1234", "auditor": "solana-auditor", "date": "2026-06-18", "network": "mainnet-beta" },
  "summary": { "critical": 1, "high": 0, "medium": 1, "low": 0, "informational": 1 },
  "findings": [
    {
      "id": "FINDING-001", "title": "Missing signer on withdraw", "severity": "Critical",
      "cvss": 9.1, "cvssVector": "AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:H/A:H",
      "category": "Account Validation", "location": "programs/vault/src/instructions/withdraw.rs:24-31",
      "status": "Open", "hasPoc": true,
      "description": "withdraw() transfers from the vault without checking authority.is_signer; any caller can drain funds.",
      "impact": "Any wallet can drain the entire SOL vault in a single transaction.",
      "poc": "#[test] fn exploit() { /* attacker calls withdraw with their own key as authority */ }",
      "recommendation": "Change `authority: AccountInfo` to `authority: Signer`."
    },
    {
      "id": "FINDING-002", "title": "Fee rounds in user's favor", "severity": "Medium",
      "cvss": 4.3, "cvssVector": "AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:L/A:N",
      "category": "Arithmetic", "location": "programs/vault/src/math.rs:12",
      "status": "Open", "hasPoc": false,
      "description": "fee = amount * bps / 10_000 truncates down; small amounts pay zero fee.",
      "impact": "Repeatable fee avoidance via fragmented transactions.",
      "recommendation": "Round fees up: add (denominator - 1) before dividing."
    },
    {
      "id": "FINDING-003", "title": "overflow-checks not set in release profile", "severity": "Informational",
      "cvss": 0.0, "cvssVector": "", "category": "Configuration", "location": "Cargo.toml",
      "status": "Open", "hasPoc": false,
      "description": "Release profile does not set overflow-checks = true.",
      "recommendation": "Add [profile.release] overflow-checks = true."
    }
  ]
};
// ─────────────────────────────────────────────────────────────────────────────

const ORDER = ["critical","high","medium","low","informational"];
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let activeFilter = null;

function render(){
  const a = DATA.audit || {};
  document.getElementById("title").textContent = (a.protocol || "Security Audit") + " — Audit Report";
  document.getElementById("meta").innerHTML =
    [a.commit ? "commit <code>"+esc(a.commit)+"</code>" : "", a.network ? esc(a.network) : "",
     a.auditor ? "by "+esc(a.auditor) : "", a.date ? esc(a.date) : ""].filter(Boolean).join(" · ");

  const sum = DATA.summary || {};
  document.getElementById("cards").innerHTML = ORDER.map(s =>
    `<div class="card${activeFilter===s?' active':''}" data-sev="${s}">
       <div class="n s-${s}">${sum[s] ?? 0}</div>
       <div class="l"><span class="dot bg-${s}"></span>${s}</div>
     </div>`).join("");

  document.querySelectorAll(".card").forEach(c => c.onclick = () => {
    const s = c.dataset.sev; activeFilter = (activeFilter===s) ? null : s; render();
  });
  renderList();
}

function renderList(){
  const q = (document.getElementById("q").value || "").toLowerCase();
  const fs = (DATA.findings || [])
    .filter(f => !activeFilter || (f.severity||"").toLowerCase()===activeFilter)
    .filter(f => !q || [f.id,f.title,f.category,f.location].join(" ").toLowerCase().includes(q))
    .sort((x,y)=>ORDER.indexOf((x.severity||"").toLowerCase())-ORDER.indexOf((y.severity||"").toLowerCase()));

  document.getElementById("count").textContent = fs.length + " finding" + (fs.length===1?"":"s");
  const list = document.getElementById("list");
  if(!fs.length){ list.innerHTML = '<div class="empty">No findings match.</div>'; return; }

  list.innerHTML = fs.map(f => {
    const sev = (f.severity||"informational").toLowerCase();
    const sec = (label, val, pre) => val ? `<h4>${label}</h4>${pre?`<pre>${esc(val)}</pre>`:`<div>${esc(val)}</div>`}` : "";
    return `<details class="finding">
      <summary>
        <span class="badge s-${sev}">${esc(f.severity||"Info")}</span>
        <span class="fid">${esc(f.id||"")}</span>
        <span class="ftitle">${esc(f.title||"")}</span>
        <span class="floc">${esc(f.location||"")}</span>
      </summary>
      <div class="body">
        <div class="kv">
          ${f.cvss?`CVSS <code>${esc(f.cvss)}</code> `:""}
          ${f.cvssVector?`<code>${esc(f.cvssVector)}</code> · `:""}
          ${f.category?`${esc(f.category)} · `:""}
          status <code>${esc(f.status||"Open")}</code>
          ${f.hasPoc?" · <code>PoC ✓</code>":""}
        </div>
        ${sec("Description", f.description)}
        ${sec("Impact", f.impact)}
        ${sec("Proof of Concept", f.poc, true)}
        ${sec("Recommendation", f.recommendation)}
      </div>
    </details>`;
  }).join("");
}

document.getElementById("q").addEventListener("input", renderList);
render();
</script>
</body>
</html>
